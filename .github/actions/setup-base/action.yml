name: 'Setup Base Environment'
description: 'Sets up the Base environment'

runs:
  using: "composite"
  steps:
    - uses: actions/setup-java@v4
      name: Set up JDK 17
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: gradle/actions/setup-gradle@v4
      name: Setup Gradle
