name: 'Setup Base Environment'
description: 'Sets up the Base environment'

inputs:
  windows:
    description: 'Whether to enable Windows-specific setup'
    required: false
    default: 'false'
  linux:
    description: 'Whether to install Linux-specific native dependencies'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - uses: actions/setup-java@v4
      name: Set up JDK 17
      with:
        java-version: '17'
        distribution: 'temurin'

    - uses: gradle/actions/setup-gradle@v4
      name: Setup Gradle

    - name: Install Linux native dependencies
      if: ${{ inputs.linux == 'true' }}
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          pkg-config \
          libx11-dev \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev
